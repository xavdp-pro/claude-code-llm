# LiteLLM — Ollama Cloud (gratuit) + OpenRouter (gratuit :free)

model_list:
  # ── OLLAMA CLOUD (gratuit) ─────────────────────────────
  - model_name: gpt-oss-20b
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: nemotron-30b
    litellm_params:
      model: ollama_chat/nemotron-3-nano:30b
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: minimax-m2.5
    litellm_params:
      model: ollama_chat/minimax-m2.5
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: minimax-m3
    litellm_params:
      model: ollama_chat/minimax-m3
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  # ── Alias Claude Code (tous → gratuits) ──
  - model_name: claude-ollama
    litellm_params:
      model: ollama_chat/gpt-oss:20b
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: claude-ollama-fast
