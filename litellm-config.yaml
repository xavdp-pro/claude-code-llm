      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  # Alias claude-* pour discovery gateway (apparaissent dans /model)
  - model_name: claude-minimax-m3
    litellm_params:
      model: ollama_chat/minimax-m3
      api_base: https://ollama.com
      api_key: os.environ/OLLAMA_API_KEY

  - model_name: claude-or-qwen-coder
